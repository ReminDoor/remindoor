<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReminDoor.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #e8e8e8;
      --muted: #555;
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.08);
      --green-glow: rgba(74, 222, 128, 0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
    }

    /* Subtle green ambient glow center */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(74, 222, 128, 0.04) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Layout */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 36px 40px;
      position: relative;
    }

    /* Header */
    header {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(15px, 2vw, 18px);
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo span {
      color: var(--green);
    }

    /* Center content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      text-align: center;
    }

    .led-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px 4px var(--green-glow), 0 0 30px 8px rgba(74,222,128,0.08);
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.6s, pulse-led 3s ease-in-out infinite 1.6s;
    }

    @keyframes pulse-led {
      0%, 100% { box-shadow: 0 0 12px 4px var(--green-glow), 0 0 30px 8px rgba(74,222,128,0.08); }
      50% { box-shadow: 0 0 18px 6px rgba(74,222,128,0.3), 0 0 50px 16px rgba(74,222,128,0.12); }
    }

    .slogan {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(32px, 8vw, 72px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }

    .slogan em {
      font-style: normal;
      color: var(--green);
    }

    .sub {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.2s;
    }

    .cta-wrap {
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.5s;
    }

    .cta {
      display: inline-block;
      padding: 14px 32px;
      border: 1px solid rgba(74, 222, 128, 0.25);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      background: var(--green-dim);
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(74,222,128,0.08) 100%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .cta:not(.locked):hover {
      border-color: rgba(74, 222, 128, 0.55);
      background: rgba(74, 222, 128, 0.12);
      box-shadow: 0 0 30px rgba(74,222,128,0.1);
      color: #fff;
    }

    .cta:not(.locked):hover::before { opacity: 1; }

    .cta.locked {
      pointer-events: none;
      cursor: default;
      color: #2a2a2a;
      border-color: #1e1e1e;
      background: transparent;
    }

    .coming-soon {
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.7s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .coming-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #333;
    }

    .timer {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: -0.02em;
      color: #2a2a2a;
      min-width: 2ch;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    .timer-sep {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      color: #222;
      margin-bottom: 14px;
    }

    /* Footer */
    footer {
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease forwards 2s;
    }

    footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    footer a:hover { color: rgba(74,222,128,0.7); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .page { padding: 28px 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo">ReminDoor<span>.</span></div>
    </header>

    <main>
      <div class="led-dot"></div>
      <h1 class="slogan">You forget.<br><em>We don't.</em></h1>
      <p class="sub">get reminded</p>
      <div class="cta-wrap">
        <a href="https://remindoor.github.io/remindoor" class="cta locked" id="cta">Enter the Concept</a>
      </div>
      <div class="coming-soon">
        <div class="coming-label">Coming Soon</div>
        <div class="timer">
          <div class="timer-block"><span class="timer-num" id="days">00</span><span class="timer-label">Days</span></div>
          <div class="timer-sep">:</div>
          <div class="timer-block"><span class="timer-num" id="hours">00</span><span class="timer-label">Hours</span></div>
          <div class="timer-sep">:</div>
          <div class="timer-block"><span class="timer-num" id="minutes">00</span><span class="timer-label">Min</span></div>
          <div class="timer-sep">:</div>
          <div class="timer-block"><span class="timer-num" id="seconds">00</span><span class="timer-label">Sec</span></div>
        </div>
      </div>
    </main>

    <footer>
      <a href="https://remindoor.github.io/remindoor">remindoor.github.io/remindoor</a>
    </footer>
  </div>
  <script>
    const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
    function pad(n) { return String(n).padStart(2, '0'); }
    function tick() {
      const diff = Math.max(0, target - Date.now());
      if (diff === 0) document.getElementById('cta').classList.remove('locked');
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent = pad(d);
      document.getElementById('hours').textContent = pad(h);
      document.getElementById('minutes').textContent = pad(m);
      document.getElementById('seconds').textContent = pad(s);
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
